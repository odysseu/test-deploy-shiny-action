name: Deploy Shiny App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy app to ShinyApps.io
        uses: odysseu/rshinyapps-actions@v2
        with:
          r-version: '4.4.3'  # Specify the desired R version
          shiny_username: ${{ secrets.SHINY_USERNAME }}
          shiny_token: ${{ secrets.SHINY_TOKEN }}
          shiny_secret: ${{ secrets.SHINY_SECRET }}
          app_name: 'Population'
          app_dir: 'populations'
